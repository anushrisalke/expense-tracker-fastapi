<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
</head>
<body>

    <h1>Add Expense</h1>

<form method="POST">

    <label>Title</label>
    <br>
    <input
        type="text"
        name="title"
        required
    >
    <br><br>

    <label>Amount</label>
    <br>
    <input
        type="number"
        step="0.01"
        name="amount"
        required
    >
    <br><br>

    <label>Category</label>
    <br>
    <input
        type="text"
        name="category"
        required
    >
    <br><br>

    <label>Date</label>
    <br>
    <input
        type="date"
        name="date"
        required
    >
    <br><br>

    <button type="submit">
        Save Expense
    </button>

</form>

<br>

<a href="/">
    Back to Home
</a>

</body>
</html>
