<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background-color:#f4f4f4;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            width:300px;
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="box">

        <h2>Signup</h2>

        <form method="post">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">
                Signup
            </button>

        </form>


<p>

    Already have an account?

    <a href="/login">

        Login

    </a>

</p>
    </div>

</body>
</html>
