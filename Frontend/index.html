<!DOCTYPE html>

<html>

<head>
    <title>Expense Tracker</title>
    <style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
}

.container{
    width:80%;
    margin:auto;
    margin-top:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.1);
}

.button{
    background:#007bff;
    color:white;
    padding:10px 20px;
    text-decoration:none;
    border-radius:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#007bff;
    color:white;
    padding:12px;
}

td{
    padding:12px;
}

tr:nth-child(even){
    background:#f2f2f2;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div style="text-align:right">
    <a href="/logout">Logout</a>
</div>

<h1>Expense Tracker</h1>

<h3>Welcome {{ current_user }}</h3>

<h2>
    Total Spending: ₹{{ total }}
</h2>

<a href="/create" class="button">
    Add Expense
</a>

<br><br>

<table>

    <tr>
        <th>Title</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    {% for expense in expenses %}

    <tr>
        <td>{{ expense.title }}</td>
        <td>{{ expense.amount }}</td>
        <td>{{ expense.category }}</td>
        <td>{{ expense.date }}</td>

        <td>
            <a href="/update/{{ expense.id }}">
                Edit
            </a>

            |

            <a href="/delete/{{ expense.id }}">
                Delete
            </a>
        </td>
    </tr>

    {% endfor %}

</table>

</div>

</div>

</body>

</html>
